    <text class="value" x="18" y="70">128</text>
    <text class="small" x="18" y="94">失败 2</text>

    <rect class="panel" x="280" y="0" width="262" height="108" rx="8"/>
    <text class="label" x="298" y="30">总 Tokens</text>
    <text class="value" x="298" y="70">1,284,560</text>

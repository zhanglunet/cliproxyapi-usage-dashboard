<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="CLIProxyAPI 用量统计面板脱敏预览图">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 1; }
      .title { fill: #17202a; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h2 { fill: #17202a; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #667085; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .value { fill: #17202a; font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #344054; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #667085; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .num { fill: #17202a; font: 13px Menlo, Consolas, monospace; }
      .line { stroke: #d9dee7; stroke-width: 1; }
      .blue { fill: #2563eb; }
      .green { fill: #0f9f6e; }
      .amber { fill: #b7791f; }
      .red { fill: #d92d20; }
      .muted { fill: #edf1f7; }
      .btn { fill: #ffffff; stroke: #d9dee7; stroke-width: 1; }
      .btn-primary { fill: #2563eb; }
      .btn-text { fill: #17202a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .btn-primary-text { fill: #ffffff; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

